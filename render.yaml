# Render Blueprint — TraceVault Backend API
# Frontend is hosted on Vercel separately.
#
# Usage:
#   1. Push this repo to GitHub
#   2. Go to https://dashboard.render.com → New → Blueprint
#   3. Connect repo → Render reads this file automatically
#   4. Set the environment variables in the Render dashboard

services:
  - type: web
    name: tracevault-api
    runtime: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB_NAME
        value: forensichain
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 12h
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: ENCRYPTION_ALGORITHM
        value: aes-256-gcm
      - key: STORAGE_DRIVER
        value: s3
      - key: STORAGE_S3_BUCKET
        sync: false
      - key: STORAGE_S3_REGION
        sync: false
      - key: STORAGE_S3_ACCESS_KEY
        sync: false
      - key: STORAGE_S3_SECRET_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false  # Set to your Vercel frontend URL
      - key: LOG_LEVEL
        value: info
      - key: RATE_LIMIT_MAX
        value: 200
